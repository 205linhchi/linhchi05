<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ</title>
</head>
<body>
    <header>
        <div class="logo">🌸Tết Thành Vinh🌸</div>
        <nav>
            <a href="index.html">Trang Chủ</a>
            <a href="gioithieu.html">Giới Thiệu</a>
            <a href="phongtuc.html">Phong Tục</a>
            <a href="amthuc.html">Ẩm Thực</a>
            <a href="vanhoa.html">Văn Hóa</a>
            <a href="lienhe.html">Liên Hệ</a>
        </nav>
    </header>

    <section class="page-banner">
        <div class="petals"></div>
        <h1>Liên hệ & Đóng góp</h1>
    </section>

    <section class="content">
        <div class="contact-container">
            <form class="contact-form">
            <input type="text" placeholder="Họ tên" required>
            <input type="email" placeholder="Email" required>
            <textarea rows ="5" placeholder="Nội dung góp ý"></textarea>
            <button type="submit">Gửi</button>
            </form>

            <div class="map-box">
            <h3>📍Địa chỉ - Thành phố Vinh, Nghệ An</h3>

            <iframe 
                src="https://www.google.com/maps?q=Vinh,+Nghe+An&output=embed"
                allowfullscreen=""
                loading="lazy">
            </iframe>
            </div>
        </div>
    </section>

    <footer>
        © 2026 - Website Tết Quê Em - Nghệ An
    </footer>

    <script>
        const petals = document.querySelector(".petals");
        for (let i = 0; i < 100; i++) {
            let flower = document.createElement("span");
            flower.style.left = Math.random() * 100 + "%";
            flower.style.animationDuration = (4 + Math.random() * 6) + "s";
            flower.style.opacity = Math.random();
            petals.appendChild(flower);
        }
    </script>
</body>
<style>
    .petals span {
        position: absolute;
        top: -50px;
        width: 18px;
        height: 18px;
        background: pink;
        border-radius: 50%;
        animation: fall linear infinite;
    }
    @keyframes fall {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(500px) rotate(360deg); }
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #fff8e1;
        padding-top: 100px; /* bằng chiều cao menu */
    }
    /* menu */
    header {
        position:fixed;
        color:#ffd700;
        font-weight: bold; 
        top: 0px;
        width: 100%;
        background: #b30000;
        display: flex;
        justify-content: space-between;
        align-items:center;
        padding: 15px 40px;
        box-sizing: border-box;
        z-index: 1000;
        
    }
    .logo {
        color: #ffd700;
        font-weight: bold;
        font-size: 28px;
    }
    nav a {
        color: #ffd700;
        text-decoration: none;
        margin: 0 10px;
        font-weight: bold;
    }
    nav a:hover {
        color: #ffffff;
    }
    .page-banner {
        margin-top: 80px;
        margin: 0px auto 40px;
        width: 80%;
        padding: 40px;
        text-align: center;
        font-size: 18px;
        color: #b30000;
        line-height: 1.5;
        background: linear-gradient(135deg, #fff8e1, #ffe0b2);
        border: 4px solid #b30000;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(179,0,0,0.4);
        position: relative;
    }   

    /* Trang trí góc */
    .page-banner::before,
    .page-banner::after {
        content: "🌸";
        position: absolute;
        font-size: 30px;
        }

    .page-banner::before {
        top: -15px;
        left: -15px;
    }

    .page-banner::after {
        bottom: -15px;
        right: -15px;
    }

    /* CONTENT */
    .content {
        padding: 50px 20px;
    }

    .contact-container {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
    }
    /* FORM */
    .contact-form {
        background: white;
        padding: 30px;
        width: 350px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(179,0,0,0.4);
    }
    .contact-form h3 {
        text-align: center;
        color: #d32f2f;
    }
    .contact-form input,
    .contact-form textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 14px;
    }
    .contact-form input:focus,
    .contact-form textarea:focus {
        border-color: #ff9800;
        outline: none;
    }
    .contact-form button {
        font-weight: bold;
        width: 100%;
        padding: 12px;
        background: linear-gradient(to right, #fff8e1, #ffe0b2);
        border: none;
        border-radius: 12px;
        color: #b30000;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }
    .contact-form button:hover {
        transform: scale(1.05);
    }

    /* MAP */
    .map-box {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 10px 25px rgba(179,0,0,0.4);
    }

    .map-box h3 {
        text-align: center;
        color: #d32f2f;
    }

    .map-box iframe {
        width: 100%;
        height: 250px;
        border-radius: 10px;
        border: none;

    }
    /* FOOTER */
    footer {
        text-align: center;
        padding: 20px;
        background: #d32f2f;
        color: white;
        margin-top: 40px;
    }
</style>
</html>
